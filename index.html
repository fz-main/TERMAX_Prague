<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMAX | Praha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --primary: #ff6b35;
    --secondary: #f7c59f;
    --dark: #0a0a0a;
    --darker: #050505;
    --accent: #ff3366;
    --gold: #ffd700;
    --blue: #00d4ff;
    --purple: #8b5cf6;
    --text: #ffffff;
    --text-muted: #a0a0a0;
    --card-bg: rgba(255,255,255,0.03);
    --border: rgba(255,107,53,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--darker);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ========== PRELOADER ========== */
  #preloader {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  #preloader.hide {
    opacity: 0;
    visibility: hidden;
  }

  .preloader-logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b35, #ff3366, #8b5cf6, #00d4ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 2s ease infinite;
    letter-spacing: 0.3em;
  }

  .preloader-bar-wrap {
    margin-top: 2rem;
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .preloader-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #ff3366, #00d4ff);
    border-radius: 2px;
    animation: loadBar 2s ease forwards;
  }

  @keyframes loadBar {
    0% { width: 0; }
    100% { width: 100%; }
  }

  .preloader-particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .preloader-particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }

  /* ========== CANVAS BACKGROUND ========== */
  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ========== CURSOR ========== */
  .cursor {
    position: fixed;
    width: 20px; height: 20px;
    background: rgba(255,107,53,0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease, background 0.3s ease;
    mix-blend-mode: difference;
  }

  .cursor-follower {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(255,107,53,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9997;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }

  .cursor.hovered { width: 50px; height: 50px; background: rgba(255,51,102,0.6); }

  @media (max-width: 768px) {
    .cursor, .cursor-follower { display: none; }
  }

  /* ========== NAVBAR ========== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 1rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(5,5,5,0);
    backdrop-filter: blur(0px);
    transition: all 0.5s ease;
    border-bottom: 1px solid transparent;
  }

  nav.scrolled {
    background: rgba(5,5,5,0.9);
    backdrop-filter: blur(20px);
    border-bottom-color: var(--border);
    padding: 0.7rem 3rem;
  }

  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b35, #ff3366);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.2em;
    text-decoration: none;
    animation: logoPulse 3s ease infinite;
  }

  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 5px rgba(255,107,53,0.3)); }
    50% { filter: drop-shadow(0 0 15px rgba(255,107,53,0.8)); }
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.3s ease;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 1px;
    background: var(--primary);
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: var(--primary); }
  .nav-links a:hover::after { width: 100%; }

  /* Language Switcher */
  .lang-switcher {
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }

  .lang-btn {
    padding: 0.3rem 0.6rem;
    border: 1px solid rgba(255,107,53,0.3);
    background: transparent;
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .lang-btn.active, .lang-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    z-index: 1001;
  }

  .hamburger span {
    width: 25px; height: 2px;
    background: var(--primary);
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* Mobile menu */
  .mobile-menu {
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.97);
    backdrop-filter: blur(20px);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .mobile-menu.open { transform: translateX(0); }

  .mobile-menu a {
    color: var(--text);
    text-decoration: none;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .mobile-menu a:hover { color: var(--primary); }

  /* ========== SECTIONS COMMON ========== */
  section {
    position: relative;
    z-index: 1;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .section-tag {
    display: inline-block;
    padding: 0.3rem 1rem;
    border: 1px solid var(--primary);
    border-radius: 20px;
    color: var(--primary);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    animation: tagPulse 2s ease infinite;
  }

  @keyframes tagPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(255,107,53,0.2); }
    50% { box-shadow: 0 0 15px rgba(255,107,53,0.5); }
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .gradient-text {
    background: linear-gradient(135deg, #ff6b35, #ff3366, #8b5cf6);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ========== HERO ========== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    overflow: hidden;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 900px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.5rem;
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 30px;
    background: rgba(255,107,53,0.05);
    backdrop-filter: blur(10px);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--secondary);
    margin-bottom: 2rem;
    animation: badgeFloat 3s ease infinite;
  }

  @keyframes badgeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .badge-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: dotPulse 1.5s ease infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.5); }
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 10vw, 7rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  .hero-title-line1 {
    display: block;
    background: linear-gradient(135deg, #ffffff, #a0a0a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: slideInLeft 1s ease both;
    animation-delay: 0.3s;
  }

  .hero-title-line2 {
    display: block;
    background: linear-gradient(135deg, #ff6b35, #ff3366, #8b5cf6, #00d4ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: slideInRight 1s ease both, gradientShift 4s ease infinite;
    animation-delay: 0.5s;
    filter: drop-shadow(0 0 30px rgba(255,107,53,0.5));
  }

  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-50px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(50px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .hero-subtitle {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto 3rem;
    line-height: 1.7;
    animation: fadeInUp 1s ease both;
    animation-delay: 0.7s;
  }

  .hero-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeInUp 1s ease both;
    animation-delay: 0.9s;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-primary {
    padding: 0.9rem 2.5rem;
    background: linear-gradient(135deg, #ff6b35, #ff3366);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
  }

  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,107,53,0.4); }

  .btn-secondary {
    padding: 0.9rem 2.5rem;
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .btn-secondary:hover {
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255,107,53,0.2);
  }

  .hero-stats {
    display: flex;
    gap: 3rem;
    justify-content: center;
    margin-top: 4rem;
    flex-wrap: wrap;
    animation: fadeInUp 1s ease both;
    animation-delay: 1.1s;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-num {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b35, #ff3366);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.3rem;
  }

  /* Hero scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    animation: scrollBounce 2s ease infinite;
    opacity: 0.5;
  }

  .scroll-indicator span {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .scroll-arrow {
    width: 24px; height: 24px;
    border-right: 2px solid var(--primary);
    border-bottom: 2px solid var(--primary);
    transform: rotate(45deg);
  }

  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(10px); }
  }

  /* Floating shapes */
  .hero-shapes {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    animation: shapeFloat linear infinite;
  }

  .shape-1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,107,53,0.15), transparent);
    top: 10%; left: 10%;
    animation-duration: 8s;
  }

  .shape-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,0.1), transparent);
    top: 20%; right: 10%;
    animation-duration: 10s;
    animation-delay: -3s;
  }

  .shape-3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(0,212,255,0.1), transparent);
    bottom: 20%; left: 30%;
    animation-duration: 7s;
    animation-delay: -5s;
  }

  @keyframes shapeFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
  }

  /* ========== ADVANTAGES ========== */
  #advantages {
    padding: 7rem 0;
  }

  .advantages-header {
    text-align: center;
    margin-bottom: 4rem;
  }

  .advantages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .adv-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: default;
  }

  .adv-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    transform: scaleX(0);
    transition: transform 0.4s ease;
  }

  .adv-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,107,53,0.05), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .adv-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: rgba(255,107,53,0.4);
    box-shadow: 0 20px 60px rgba(255,107,53,0.15);
  }

  .adv-card:hover::before { transform: scaleX(1); }
  .adv-card:hover::after { opacity: 1; }

  .adv-icon {
    width: 60px; height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 1.2rem;
    position: relative;
    z-index: 1;
  }

  .adv-icon-1 { background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,51,102,0.2)); }
  .adv-icon-2 { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(0,212,255,0.2)); }
  .adv-icon-3 { background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,255,136,0.2)); }
  .adv-icon-4 { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,53,0.2)); }
  .adv-icon-5 { background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(139,92,246,0.2)); }
  .adv-icon-6 { background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,212,255,0.2)); }

    font-size: 1.1rem;
    font-weight:
